<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Password Manager</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: "Poppins", sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      background: url('https://source.unsplash.com/1600x900/?galaxy,space,nebula') center/cover no-repeat;
      filter: blur(2px);
      opacity: 0.45;
      z-index: -2;
    }
    canvas {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh;
      z-index: -1; pointer-events: none;
    }

    .card {
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 22px;
      padding: 38px 32px 32px;
      width: min(370px, 94vw);
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
      position: relative;
      z-index: 10;
    }
    .card h2 { text-align:center; font-size:1.5rem; margin-bottom:22px; }

    /* Tabs */
    .tabs {
      display: flex;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
      margin-bottom: 26px;
    }
    .tab-btn {
      flex: 1; padding: 10px 0;
      background: transparent; border: none;
      color: rgba(255,255,255,0.5);
      font-family: inherit; font-size: 0.87rem; font-weight: 600;
      cursor: pointer; transition: background 0.25s, color 0.25s;
    }
    .tab-btn.active { background: linear-gradient(135deg,#43cea2,#185a9d); color:#fff; }
    .tab-btn:not(.active):hover { background:rgba(255,255,255,0.08); color:#fff; }

    .panel { display:none; }
    .panel.active { display:block; }

    /* Fields */
    .field { margin-bottom: 15px; position: relative; }
    .field label { font-size:0.76rem; color:rgba(255,255,255,0.55); display:block; margin-bottom:5px; }
    .field input {
      width: 100%;
      padding: 11px 40px 11px 13px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 9px;
      background: rgba(255,255,255,0.12);
      color: #fff; font-family: inherit; font-size: 0.97rem;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .field input:focus { outline:none; background:rgba(255,255,255,0.22); box-shadow:0 0 0 2px rgba(67,206,162,0.4); }
    .field input::placeholder { color:rgba(255,255,255,0.35); }
    .eye {
      position:absolute; right:12px; bottom:11px;
      cursor:pointer; font-size:1rem;
      color:rgba(255,255,255,0.4); transition:color 0.2s;
      user-select: none;
    }
    .eye:hover { color:#fff; }

    /* Strength */
    .strength-wrap { margin-top:5px; height:4px; border-radius:4px; background:rgba(255,255,255,0.1); }
    .strength-bar   { height:100%; width:0; border-radius:4px; transition:width 0.3s, background 0.3s; }
    .strength-label { font-size:0.7rem; color:rgba(255,255,255,0.4); margin-top:3px; min-height:14px; }

    .btn {
      width:100%; padding:12px; border:none; border-radius:9px;
      background: linear-gradient(135deg,#43cea2,#185a9d);
      color:#fff; font-family:inherit; font-weight:700; font-size:1rem;
      cursor:pointer; margin-top:6px;
      transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
    }
    .btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,0,0,0.3); }
    .btn:disabled { opacity:0.45; cursor:not-allowed; }

    .msg {
      margin-top:14px; padding:10px 13px;
      border-radius:8px; font-size:0.875rem; font-weight:600;
      display:none; text-align:center;
    }
    .msg.error   { display:block; background:rgba(255,70,70,0.15);  color:#ff6b6b; border:1px solid rgba(255,70,70,0.3); }
    .msg.success { display:block; background:rgba(67,206,162,0.12); color:#43cea2; border:1px solid rgba(67,206,162,0.3); }

    .back-link {
      display:block; text-align:center; margin-top:18px;
      font-size:0.8rem; color:rgba(255,255,255,0.4);
      text-decoration:none; transition:color 0.2s;
    }
    .back-link:hover { color:#fff; }
  </style>
</head>
<body>
<canvas id="starCanvas"></canvas>

<div class="card">
  <h2>🔐 Password Manager</h2>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('change')">Change Password</button>
    <button class="tab-btn"        onclick="switchTab('reset')">Reset Password</button>
  </div>

  <!-- ── TAB 1: Change (requires current password) ── -->
  <div id="panel-change" class="panel active">
    <div class="field">
      <label>Email</label>
      <input id="change-email" type="email" placeholder="your@email.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Current Password</label>
      <input id="change-current" type="password" placeholder="Enter current password" autocomplete="current-password" />
      <span class="eye" onclick="toggleEye('change-current',this)">👁</span>
    </div>
    <div class="field">
      <label>New Password</label>
      <input id="change-new" type="password" placeholder="At least 6 characters" autocomplete="new-password"
             oninput="checkStrength(this,'change-bar','change-slabel')" />
      <span class="eye" onclick="toggleEye('change-new',this)">👁</span>
      <div class="strength-wrap"><div class="strength-bar" id="change-bar"></div></div>
      <div class="strength-label" id="change-slabel"></div>
    </div>
    <div class="field">
      <label>Confirm New Password</label>
      <input id="change-confirm" type="password" placeholder="Repeat new password" autocomplete="new-password" />
      <span class="eye" onclick="toggleEye('change-confirm',this)">👁</span>
    </div>
    <button class="btn" onclick="changePassword()">Update Password</button>
    <div id="change-msg" class="msg"></div>
  </div>

  <!-- ── TAB 2: Reset (no current password needed) ── -->
  <div id="panel-reset" class="panel">
    <div class="field">
      <label>Email</label>
      <input id="reset-email" type="email" placeholder="your@email.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>New Password</label>
      <input id="reset-new" type="password" placeholder="At least 6 characters" autocomplete="new-password"
             oninput="checkStrength(this,'reset-bar','reset-slabel')" />
      <span class="eye" onclick="toggleEye('reset-new',this)">👁</span>
      <div class="strength-wrap"><div class="strength-bar" id="reset-bar"></div></div>
      <div class="strength-label" id="reset-slabel"></div>
    </div>
    <div class="field">
      <label>Confirm New Password</label>
      <input id="reset-confirm" type="password" placeholder="Repeat new password" autocomplete="new-password" />
      <span class="eye" onclick="toggleEye('reset-confirm',this)">👁</span>
    </div>
    <button class="btn" onclick="resetPassword()">Reset Password</button>
    <div id="reset-msg" class="msg"></div>
  </div>

  <a href="login.html" class="back-link">← Back to Login</a>
</div>

<script>
  const API_BASE_URL = 'http://127.0.0.1:5000';

  // ── Tab switching ──────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      b.classList.toggle('active', (i === 0 && tab==='change') || (i === 1 && tab==='reset'));
    });
    document.getElementById('panel-change').classList.toggle('active', tab==='change');
    document.getElementById('panel-reset').classList.toggle('active',  tab==='reset');
    clearMsg('change-msg');
    clearMsg('reset-msg');
  }

  // ── Helpers ────────────────────────────────────────────────────
  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `msg ${type}`;
  }
  function clearMsg(id) {
    const el = document.getElementById(id);
    el.textContent = '';
    el.className = 'msg';
  }

  function toggleEye(inputId, eyeEl) {
    const inp = document.getElementById(inputId);
    if (inp.type === 'password') { inp.type = 'text';     eyeEl.textContent = '🙈'; }
    else                         { inp.type = 'password'; eyeEl.textContent = '👁'; }
  }

  function checkStrength(input, barId, labelId) {
    const val = input.value;
    const bar = document.getElementById(barId);
    const lbl = document.getElementById(labelId);
    let score = 0;
    if (val.length >= 6)  score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = [
      { w:'0%',   bg:'transparent', text:'' },
      { w:'25%',  bg:'#e74c3c',     text:'Weak' },
      { w:'50%',  bg:'#e67e22',     text:'Fair' },
      { w:'75%',  bg:'#f1c40f',     text:'Good' },
      { w:'100%', bg:'#43cea2',     text:'Strong' },
    ];
    const lvl = levels[Math.min(score, 4)];
    bar.style.width      = lvl.w;
    bar.style.background = lvl.bg;
    lbl.textContent      = lvl.text;
  }

  function validate(newPass, confirmPass, msgId) {
    if (!newPass || !confirmPass) {
      showMsg(msgId, 'All fields are required.', 'error'); return false;
    }
    if (newPass.length < 6) {
      showMsg(msgId, 'Password must be at least 6 characters.', 'error'); return false;
    }
    if (newPass !== confirmPass) {
      showMsg(msgId, 'Passwords do not match.', 'error'); return false;
    }
    return true;
  }

  // ── CHANGE PASSWORD (verifies current password via /login first) ──
  async function changePassword() {
    clearMsg('change-msg');
    const email   = document.getElementById('change-email').value.trim();
    const current = document.getElementById('change-current').value;
    const newPass = document.getElementById('change-new').value;
    const confirm = document.getElementById('change-confirm').value;

    if (!email)   { showMsg('change-msg','Please enter your email.','error'); return; }
    if (!current) { showMsg('change-msg','Please enter your current password.','error'); return; }
    if (!validate(newPass, confirm, 'change-msg')) return;

    try {
      // Step 1: verify current password via login endpoint
      const loginRes = await fetch(`${API_BASE_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: current })
      });

      if (loginRes.status === 404) { showMsg('change-msg','Email not found.','error'); return; }
      if (loginRes.status === 401) { showMsg('change-msg','Current password is incorrect.','error'); return; }
      if (!loginRes.ok)            { showMsg('change-msg','Login verification failed.','error'); return; }

      // Step 2: set new password
      const resetRes = await fetch(`${API_BASE_URL}/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: newPass })
      });
      const result = await resetRes.json();

      if (result.success) {
        showMsg('change-msg', '✅ Password updated successfully!', 'success');
        document.getElementById('change-current').value = '';
        document.getElementById('change-new').value     = '';
        document.getElementById('change-confirm').value = '';
        setTimeout(() => window.location.href = 'login.html', 2000);
      } else {
        showMsg('change-msg', result.message || 'Failed to update password.', 'error');
      }
    } catch (err) {
      console.error(err);
      showMsg('change-msg', 'Network error. Please try again.', 'error');
    }
  }

  // ── RESET PASSWORD (no current password — admin/direct reset) ──
  async function resetPassword() {
    clearMsg('reset-msg');
    const email   = document.getElementById('reset-email').value.trim();
    const newPass = document.getElementById('reset-new').value;
    const confirm = document.getElementById('reset-confirm').value;

    if (!email) { showMsg('reset-msg','Please enter your email.','error'); return; }
    if (!validate(newPass, confirm, 'reset-msg')) return;

    try {
      const res = await fetch(`${API_BASE_URL}/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: newPass })
      });
      const result = await res.json();

      if (result.success) {
        showMsg('reset-msg', '✅ Password reset successfully!', 'success');
        document.getElementById('reset-new').value     = '';
        document.getElementById('reset-confirm').value = '';
        setTimeout(() => window.location.href = 'login.html', 2000);
      } else {
        showMsg('reset-msg', result.message || 'Failed to reset password.', 'error');
      }
    } catch (err) {
      console.error(err);
      showMsg('reset-msg', 'Network error. Please try again.', 'error');
    }
  }

  // ── Starfield ──────────────────────────────────────────────────
  const canvas = document.getElementById('starCanvas');
  const ctx    = canvas.getContext('2d');
  let stars = [], moveX = 0, moveY = 0;
  const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({ length: 300 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.5,
      sx: Math.random() * 0.05 + 0.02,
      sy: Math.random() * 0.05 + 0.02,
    }));
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.x += moveX * s.sx * (isMobile ? 1 : 1.5);
      s.y += moveY * s.sy * (isMobile ? 1 : 1.5);
      if (s.x < 0) s.x = canvas.width;  if (s.x > canvas.width)  s.x = 0;
      if (s.y < 0) s.y = canvas.height; if (s.y > canvas.height) s.y = 0;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'white';
      ctx.globalAlpha = Math.random() * 0.6 + 0.2;
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(animate);
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  animate();

  if (isMobile) {
    window.addEventListener('deviceorientation', e => {
      if (e.gamma != null) { moveX += (e.gamma * 0.2 - moveX) * 0.05; moveY += (e.beta * 0.1 - moveY) * 0.05; }
    });
  } else {
    window.addEventListener('mousemove', e => {
      moveX = (e.clientX / window.innerWidth  - 0.5) * 9;
      moveY = (e.clientY / window.innerHeight - 0.5) * 9;
    });
  }
</script>
</body>
</html>
